name: Runtime PR Debug

on:
  push:
    branches:
      - runtime-e2e-live-features
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck-log:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Capture TypeScript output
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm run web:typecheck 2>&1 | tee runtime-typecheck.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-typecheck-log
          path: runtime-typecheck.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve failure status
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
