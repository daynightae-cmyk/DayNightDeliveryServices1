name: DAY NIGHT iOS IPA

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/day-night-ios.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_ID: ae.daynight.admin
  APP_NAME: DAY NIGHT
  APP_VERSION: 1.1.0
  BUILD_NUMBER: '110'
  WEB_ROOT: artifacts/day-night-delivery
  IOS_ROOT: ${{ runner.temp }}/day-night-ios-builder
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://ngdwybpgacauorygoedi.supabase.co' }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare macOS workspace
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          python3 - <<'PY'
          from pathlib import Path
          p = Path('pnpm-workspace.yaml')
          blocked = ('darwin-arm64', 'darwin-x64')
          p.write_text('\n'.join(
              line for line in p.read_text().splitlines()
              if not ('": "-"' in line and any(x in line for x in blocked))
          ) + '\n')
          PY
          pnpm install --no-frozen-lockfile --force

      - name: Build DAY NIGHT web app
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}"
            [[ -n "${VITE_SUPABASE_ANON_KEY:-}" ]] && echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" || true
          } > "${WEB_ROOT}/.env.production.local"
          pnpm run web:build
          test -f "${WEB_ROOT}/dist/public/index.html"

      - name: Create Capacitor iOS project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${IOS_ROOT}"
          mkdir -p "${IOS_ROOT}/www"
          cp -R "${WEB_ROOT}/dist/public/." "${IOS_ROOT}/www/"
          cat > "${IOS_ROOT}/package.json" <<EOF
          {
            "name":"day-night-ios",
            "version":"${APP_VERSION}",
            "private":true,
            "type":"module",
            "dependencies":{
              "@capacitor/core":"^8.0.0",
              "@capacitor/ios":"^8.0.0",
              "@capacitor/app":"^8.0.0",
              "@capacitor/browser":"^8.0.0",
              "@capacitor/camera":"^8.0.0",
              "@capacitor/geolocation":"^8.0.0",
              "@capacitor/splash-screen":"^8.0.0",
              "@capacitor/status-bar":"^8.0.0"
            },
            "devDependencies":{"@capacitor/cli":"^8.0.0","typescript":"^5.9.0"}
          }
          EOF
          cat > "${IOS_ROOT}/capacitor.config.ts" <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: '${APP_ID}',
            appName: '${APP_NAME}',
            webDir: 'www',
            loggingBehavior: 'none',
            backgroundColor: '#071A33',
            ios: { backgroundColor: '#071A33', allowsLinkPreview: false },
            plugins: {
              SplashScreen: { launchShowDuration: 1600, backgroundColor: '#071A33', showSpinner: false },
              StatusBar: { overlaysWebView: false }
            }
          };
          export default config;
          EOF
          cd "${IOS_ROOT}"
          pnpm install --no-frozen-lockfile
          pnpm exec cap add ios
          pnpm exec cap sync ios

      - name: Apply iPhone metadata
        shell: bash
        run: |
          set -euo pipefail
          PLIST="${IOS_ROOT}/ios/App/App/Info.plist"
          PROJ="${IOS_ROOT}/ios/App/App.xcodeproj/project.pbxproj"
          plutil -replace CFBundleDisplayName -string "${APP_NAME}" "$PLIST" 2>/dev/null || plutil -insert CFBundleDisplayName -string "${APP_NAME}" "$PLIST"
          plutil -replace CFBundleShortVersionString -string "${APP_VERSION}" "$PLIST" 2>/dev/null || plutil -insert CFBundleShortVersionString -string "${APP_VERSION}" "$PLIST"
          plutil -replace CFBundleVersion -string "${BUILD_NUMBER}" "$PLIST" 2>/dev/null || plutil -insert CFBundleVersion -string "${BUILD_NUMBER}" "$PLIST"
          plutil -insert NSCameraUsageDescription -string 'تصوير الكوبون وإثبات التسليم.' "$PLIST" 2>/dev/null || true
          plutil -insert NSPhotoLibraryUsageDescription -string 'اختيار صور الكوبونات وإثباتات التسليم.' "$PLIST" 2>/dev/null || true
          plutil -insert NSLocationWhenInUseUsageDescription -string 'التتبع المباشر ومسارات التوصيل.' "$PLIST" 2>/dev/null || true
          python3 - "$PROJ" "${APP_ID}" "${APP_VERSION}" "${BUILD_NUMBER}" <<'PY'
          from pathlib import Path
          import re, sys
          p=Path(sys.argv[1]); bundle,version,build=sys.argv[2:]
          s=p.read_text()
          s=re.sub(r'PRODUCT_BUNDLE_IDENTIFIER = [^;]+;',f'PRODUCT_BUNDLE_IDENTIFIER = {bundle};',s)
          s=re.sub(r'MARKETING_VERSION = [^;]+;',f'MARKETING_VERSION = {version};',s)
          s=re.sub(r'CURRENT_PROJECT_VERSION = [^;]+;',f'CURRENT_PROJECT_VERSION = {build};',s)
          p.write_text(s)
          PY

      - name: Build one IPA file
        shell: bash
        run: |
          set -euo pipefail
          rm -rf DerivedData Payload output
          xcodebuild \
            -workspace "${IOS_ROOT}/ios/App/App.xcworkspace" \
            -scheme App -configuration Release \
            -sdk iphoneos -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build
          APP="$(find DerivedData/Build/Products -type d -path '*Release-iphoneos/*.app' | head -n1)"
          test -n "$APP"
          mkdir -p Payload output
          cp -R "$APP" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload "output/DAY-NIGHT-iOS-v${APP_VERSION}-UNSIGNED.ipa"
          shasum -a 256 output/*.ipa
          ls -lh output/*.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-iOS-v1.1.0
          path: output/*.ipa
          if-no-files-found: error
          retention-days: 14
