name: Production Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  day-night-web:
    name: DAY NIGHT web validation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: |
          set -o pipefail
          pnpm run web:typecheck 2>&1 | tee typecheck.log

      - name: Upload TypeScript diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-closure-typecheck
          path: typecheck.log
          if-no-files-found: error
          retention-days: 1

      - name: Production hardening gate
        run: pnpm run web:gate

      - name: Build production app
        run: pnpm run web:build
