name: Production Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  day-night-web:
    name: DAY NIGHT web validation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile 2>&1 | tee pnpm-install.log

      - name: Upload pnpm install diagnostics
        if: steps.install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-install-diagnostic
          path: pnpm-install.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when dependency installation failed
        if: steps.install.outcome == 'failure'
        shell: bash
        run: |
          echo "pnpm installation failed. Last 140 log lines:"
          tail -n 140 pnpm-install.log
          exit 1

      - name: TypeScript check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm run web:typecheck 2>&1 | tee typescript-check.log

      - name: Upload TypeScript diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typescript-check-diagnostic
          path: typescript-check.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when TypeScript validation failed
        if: steps.typecheck.outcome == 'failure'
        shell: bash
        run: |
          echo "TypeScript validation failed. Last 180 log lines:"
          tail -n 180 typescript-check.log
          exit 1

      - name: Production hardening gate
        id: production_gate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm run web:gate 2>&1 | tee production-gate.log

      - name: Upload production gate diagnostics
        if: steps.production_gate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-gate-diagnostic
          path: production-gate.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when production gate failed
        if: steps.production_gate.outcome == 'failure'
        shell: bash
        run: |
          echo "Production gate failed. Last 220 log lines:"
          tail -n 220 production-gate.log
          exit 1

      - name: Build production app
        run: pnpm run web:build
