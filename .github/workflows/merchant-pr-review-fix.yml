name: Merchant PR review fix

on:
  push:
    branches:
      - merchant-figma-business-center-redesign
    paths:
      - .github/workflows/merchant-pr-review-fix.yml

permissions:
  contents: write

jobs:
  apply-review-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: merchant-figma-business-center-redesign
          fetch-depth: 0

      - name: Apply focused merchant review fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("artifacts/day-night-delivery/src/components/merchant/MerchantPortal.tsx")
          source = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '''function orderCollected(order: MerchantOrder) {
            return order.collected_amount ?? orderCod(order) ?? 0;
          }''',
                  '''function orderCollected(order: MerchantOrder) {
            const explicitAmount = order.collected_amount;
            if (explicitAmount !== null && explicitAmount !== undefined && explicitAmount !== "") return explicitAmount;
            const status = normalizeStatus(order.status);
            const isFinanciallyPosted = Boolean(order.financial_posted_at || order.settlement_id || order.settled_at || order.cod_collected_at);
            return status === "delivered" || isFinanciallyPosted ? orderCod(order) : 0;
          }''',
              ),
              (
                  '''  const [orderStatusFilter, setOrderStatusFilter] = useState("all");
            const [editingProfile, setEditingProfile] = useState(false);''',
                  '''  const [orderStatusFilter, setOrderStatusFilter] = useState("all");
            const [selectedTrackingReference, setSelectedTrackingReference] = useState("");
            const [editingProfile, setEditingProfile] = useState(false);''',
              ),
              (
                  '''  const mapOrder = activeOrders[0] || latestOrder || null;''',
                  '''  const mapOrder = activeOrders.find((order) => orderReference(order) === selectedTrackingReference) || activeOrders[0] || latestOrder || null;''',
              ),
              (
                  '''{activeOrders.slice(0, 10).map((order) => <button key={orderReference(order)} type="button">''',
                  '''{activeOrders.slice(0, 10).map((order) => <button key={orderReference(order)} type="button" onClick={() => setSelectedTrackingReference(orderReference(order))}>''',
              ),
          ]

          for old, new in replacements:
              if old not in source:
                  raise SystemExit(f"Expected merchant source fragment not found:\n{old}")
              source = source.replace(old, new, 1)

          path.write_text(source, encoding="utf-8")
          PY

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "DAY NIGHT Automation"
          git config user.email "actions@users.noreply.github.com"
          git add artifacts/day-night-delivery/src/components/merchant/MerchantPortal.tsx
          git commit -m "Fix merchant collection totals and map selection"
          git push origin HEAD:merchant-figma-business-center-redesign
