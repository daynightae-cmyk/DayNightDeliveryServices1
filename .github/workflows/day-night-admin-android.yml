name: DAY NIGHT Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/day-night-delivery/src/lib/nativeAndroidRuntime.ts"
      - "artifacts/day-night-delivery/src/styles/dn-native-android.css"
      - "artifacts/day-night-delivery/src/main.tsx"
      - "artifacts/day-night-delivery/public/assets/daynight/logo.png"
      - "mobile/day-night-admin-android/**"
      - ".github/workflows/day-night-admin-android.yml"
  push:
    branches:
      - main
    paths:
      - "artifacts/day-night-delivery/src/lib/nativeAndroidRuntime.ts"
      - "artifacts/day-night-delivery/src/styles/dn-native-android.css"
      - "artifacts/day-night-delivery/src/main.tsx"
      - "artifacts/day-night-delivery/public/assets/daynight/logo.png"
      - "mobile/day-night-admin-android/**"
      - ".github/workflows/day-night-admin-android.yml"

permissions:
  contents: read

concurrency:
  group: day-night-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build full DAY NIGHT Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Install web workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check DAY NIGHT web application
        run: pnpm run web:typecheck

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install Capacitor wrapper dependencies
        working-directory: mobile/day-night-admin-android
        run: npm install --no-audit --no-fund

      - name: Generate full app and force official full-color logo
        working-directory: mobile/day-night-admin-android
        run: npm run android:generate

      - name: Build installable debug APK and unsigned release APK
        working-directory: mobile/day-night-admin-android/android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace --console=plain assembleDebug assembleRelease 2>&1 | tee ../gradle-build.log

      - name: Verify launcher icon is colored logo and not themed monochrome
        shell: bash
        run: |
          set -euo pipefail
          APK="mobile/day-night-admin-android/android/app/build/outputs/apk/debug/app-debug.apk"
          OFFICIAL="artifacts/day-night-delivery/public/assets/daynight/logo.png"
          LIST="$RUNNER_TEMP/apk-files.txt"
          EXTRACTED="$RUNNER_TEMP/ic_launcher.png"

          unzip -Z1 "$APK" | sort > "$LIST"

          if grep -Eq '^res/mipmap-anydpi-v26/ic_launcher(_round)?\.xml$' "$LIST"; then
            echo "ERROR: adaptive/themed launcher XML is still present."
            exit 1
          fi

          if grep -Eq 'ic_launcher_foreground|monochrome' "$LIST"; then
            echo "ERROR: themed foreground resources are still present."
            exit 1
          fi

          ICON_PATH="$(grep -E '^res/mipmap-xxxhdpi[^/]*/ic_launcher\.png$' "$LIST" | head -n 1)"
          if [[ -z "$ICON_PATH" ]]; then
            echo "ERROR: xxxhdpi launcher PNG not found."
            exit 1
          fi

          unzip -p "$APK" "$ICON_PATH" > "$EXTRACTED"
          OFFICIAL_HASH="$(sha256sum "$OFFICIAL" | awk '{print $1}')"
          APK_ICON_HASH="$(sha256sum "$EXTRACTED" | awk '{print $1}')"

          echo "Official logo SHA-256: $OFFICIAL_HASH"
          echo "APK icon SHA-256:      $APK_ICON_HASH"

          if [[ "$OFFICIAL_HASH" != "$APK_ICON_HASH" ]]; then
            echo "ERROR: APK launcher icon is not the exact official logo."
            exit 1
          fi

          file "$EXTRACTED"
          echo "PASS: APK uses exact full-color official PNG with no adaptive monochrome icon."

      - name: Sign release APK with permanent company key
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          ROOT="mobile/day-night-admin-android"
          UNSIGNED="$ROOT/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="$ROOT/android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="$ROOT/android/app/build/outputs/apk/release/app-release-signed.apk"
          KEYSTORE="$RUNNER_TEMP/day-night-release.jks"
          BUILD_TOOLS="$ANDROID_HOME/build-tools/36.0.0"

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          chmod 600 "$KEYSTORE"
          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" "$ALIGNED"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "env:ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "env:ANDROID_KEY_PASSWORD" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED" \
            "$ALIGNED"
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$SIGNED"
          "$BUILD_TOOLS/zipalign" -c -v 4 "$SIGNED"
          rm -f "$ALIGNED" "$KEYSTORE"

      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Android-Gradle-Diagnostics
          path: |
            mobile/day-night-admin-android/gradle-build.log
            mobile/day-night-admin-android/android/app/build/reports/**
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6

      - name: Prepare distribution files
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="mobile/day-night-admin-android/android/app/build/outputs/apk"
          OUTPUT="mobile/day-night-admin-android/output"
          mkdir -p "$OUTPUT"

          cp "$SOURCE/debug/app-debug.apk" "$OUTPUT/DAY-NIGHT-Android-v1.1.1-Internal.apk"

          SIGNING_MODE="unsigned-release"
          RELEASE_FILE="DAY-NIGHT-Android-v1.1.1-release-unsigned.apk"
          if [[ -f "$SOURCE/release/app-release-signed.apk" ]]; then
            cp "$SOURCE/release/app-release-signed.apk" "$OUTPUT/DAY-NIGHT-Android-v1.1.1.apk"
            SIGNING_MODE="permanent-company-key"
            RELEASE_FILE="DAY-NIGHT-Android-v1.1.1.apk"
          else
            cp "$SOURCE/release/app-release-unsigned.apk" "$OUTPUT/$RELEASE_FILE"
          fi

          (
            cd "$OUTPUT"
            sha256sum *.apk > SHA256SUMS.txt
          )

          cat > "$OUTPUT/BUILD-REPORT.txt" <<REPORT
          DAY NIGHT Android — Samsung Launcher Icon Hotfix
          =================================================
          Repository: $GITHUB_REPOSITORY
          Commit: $GITHUB_SHA
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Package ID: ae.daynight.admin
          Visible name: DAY NIGHT
          Version: 1.1.1 (10101)
          Capacitor: 8.0.0
          Minimum Android: API 24
          Target Android: API 36
          Production portal: https://daynightae.com/
          Update model: live production shell with automatic deployment checks
          Launcher icon mode: exact official full-color PNG; adaptive monochrome resources removed
          Signing mode: $SIGNING_MODE
          Release file: $RELEASE_FILE
          REPORT

          ls -lh "$OUTPUT"

      - name: Upload Android APK package
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Android-v1.1.1
          path: mobile/day-night-admin-android/output/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
