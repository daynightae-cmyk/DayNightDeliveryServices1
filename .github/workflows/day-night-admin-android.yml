name: DAY NIGHT Admin Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/day-night-delivery/src/lib/nativeAndroidRuntime.ts"
      - "artifacts/day-night-delivery/src/styles/dn-native-android.css"
      - "artifacts/day-night-delivery/src/main.tsx"
      - "mobile/day-night-admin-android/**"
      - ".github/workflows/day-night-admin-android.yml"
  push:
    branches:
      - main
    paths:
      - "artifacts/day-night-delivery/src/lib/nativeAndroidRuntime.ts"
      - "artifacts/day-night-delivery/src/styles/dn-native-android.css"
      - "artifacts/day-night-delivery/src/main.tsx"
      - "mobile/day-night-admin-android/**"
      - ".github/workflows/day-night-admin-android.yml"

permissions:
  contents: read

concurrency:
  group: day-night-admin-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Install web workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check DAY NIGHT web application
        run: pnpm run web:typecheck

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install Capacitor wrapper dependencies
        working-directory: mobile/day-night-admin-android
        run: npm install --no-audit --no-fund

      - name: Generate and configure native Android project
        working-directory: mobile/day-night-admin-android
        run: npm run android:generate

      - name: Build installable debug APK and unsigned release APK
        working-directory: mobile/day-night-admin-android/android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace --console=plain assembleDebug assembleRelease 2>&1 | tee ../gradle-build.log

      - name: Sign release APK with permanent company key
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          ROOT="mobile/day-night-admin-android"
          UNSIGNED="$ROOT/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="$ROOT/android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="$ROOT/android/app/build/outputs/apk/release/app-release-signed.apk"
          KEYSTORE="$RUNNER_TEMP/day-night-admin-release.jks"
          BUILD_TOOLS="$ANDROID_HOME/build-tools/36.0.0"

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          chmod 600 "$KEYSTORE"

          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" "$ALIGNED"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "env:ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "env:ANDROID_KEY_PASSWORD" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED" \
            "$ALIGNED"

          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$SIGNED"
          "$BUILD_TOOLS/zipalign" -c -v 4 "$SIGNED"
          rm -f "$ALIGNED" "$KEYSTORE"

      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Admin-Android-Gradle-Diagnostics
          path: |
            mobile/day-night-admin-android/gradle-build.log
            mobile/day-night-admin-android/android/app/build/reports/**
          if-no-files-found: warn
          retention-days: 7
          compression-level: 6

      - name: Prepare distribution files
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="mobile/day-night-admin-android/android/app/build/outputs/apk"
          OUTPUT="mobile/day-night-admin-android/output"
          mkdir -p "$OUTPUT"

          cp "$SOURCE/debug/app-debug.apk" "$OUTPUT/DAY-NIGHT-Admin-Android-debug.apk"

          SIGNING_MODE="unsigned-release"
          RELEASE_FILE="DAY-NIGHT-Admin-Android-release-unsigned.apk"
          if [[ -f "$SOURCE/release/app-release-signed.apk" ]]; then
            cp "$SOURCE/release/app-release-signed.apk" "$OUTPUT/DAY-NIGHT-Admin-Android-v1.0.0.apk"
            SIGNING_MODE="permanent-company-key"
            RELEASE_FILE="DAY-NIGHT-Admin-Android-v1.0.0.apk"
          else
            cp "$SOURCE/release/app-release-unsigned.apk" "$OUTPUT/$RELEASE_FILE"
          fi

          (
            cd "$OUTPUT"
            sha256sum *.apk > SHA256SUMS.txt
          )

          cat > "$OUTPUT/BUILD-REPORT.txt" <<REPORT
          DAY NIGHT Admin Android
          =======================
          Repository: $GITHUB_REPOSITORY
          Commit: $GITHUB_SHA
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          App ID: ae.daynight.admin
          Version: 1.0.0 (10000)
          Capacitor: 8.0.0
          Minimum Android: API 24
          Target Android: API 36
          Production portal: https://daynightae.com/auth
          Signing mode: $SIGNING_MODE
          Release file: $RELEASE_FILE

          DAY-NIGHT-Admin-Android-debug.apk is installable for internal testing.
          When the four protected signing secrets are configured, the workflow also emits the permanently signed DAY-NIGHT-Admin-Android-v1.0.0.apk release.
          REPORT

          ls -lh "$OUTPUT"

      - name: Upload Android APK package
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Admin-Android-APK
          path: mobile/day-night-admin-android/output/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
