name: Driver Typecheck Debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  typecheck-debug:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --config.optional=true
      - name: Run typecheck and report exact errors
        id: check
        shell: bash
        run: |
          set +e
          pnpm --dir artifacts/day-night-delivery typecheck > /tmp/typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 120 /tmp/typecheck.log
          exit 0
      - name: Comment errors
        if: steps.check.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '### Driver TypeScript errors'
            echo '```text'
            tail -n 100 /tmp/typecheck.log
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/comment.md
      - name: Fail after reporting
        if: steps.check.outputs.exit_code != '0'
        run: exit 1
