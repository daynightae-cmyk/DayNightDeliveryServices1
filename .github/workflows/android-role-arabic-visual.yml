name: Android Role Arabic Visual Acceptance

on:
  pull_request:
    paths:
      - "artifacts/day-night-delivery/**"
      - "android-role-shell/**"
      - ".github/workflows/android-role-arabic-visual.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-role-arabic-visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  arabic-visual:
    name: Arabic splash handoff and branch-build visual acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build and serve the exact PR web application
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm run web:build
          test -s artifacts/day-night-delivery/dist/public/index.html
          grep -F 'LANGUAGE_EXPLICIT_KEY' artifacts/day-night-delivery/src/i18n/index.ts
          grep -F 'navigator.languages' artifacts/day-night-delivery/src/i18n/index.ts
          grep -F 'data-language' artifacts/day-night-delivery/index.html
          grep -F 'dnBootAbsoluteFailsafe' artifacts/day-night-delivery/index.html
          grep -F 'removeNativeRoleCaches' artifacts/day-night-delivery/src/lib/pwaRuntime.ts
          mkdir -p android-role-shell/arabic-visual
          nohup pnpm --dir artifacts/day-night-delivery exec vite preview --host 0.0.0.0 --port 4173 --strictPort > android-role-shell/arabic-visual/local-web.log 2>&1 &
          echo $! > android-role-shell/arabic-visual/local-web.pid
          ready=""
          for attempt in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:4173/driver?nativeShell=driver&lang=ar" | grep -F 'id="root"' >/dev/null; then
              ready="1"
              break
            fi
            sleep 1
          done
          if [ "$ready" != "1" ]; then
            cat android-role-shell/arabic-visual/local-web.log || true
            exit 1
          fi
          curl -fsS "http://127.0.0.1:4173/merchant?nativeShell=merchant&lang=ar" | grep -F 'id="root"' >/dev/null

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 image
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" "emulator" "system-images;android-36;google_apis;x86_64"

      - name: Python and official icons
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "pillow>=10,<13"
          python android-role-shell/scripts/prepare_icons.py

      - name: Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build isolated Arabic visual APKs
        shell: bash
        env:
          DAYNIGHT_ROLE_WEB_BASE_URL: http://10.0.2.2:4173
          DAYNIGHT_ROLE_VISUAL_QUERY: lang=ar
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain assembleDriverVisual assembleMerchantVisual
          grep -R -F 'lang=ar' android-role-shell/app/build/generated/source/buildConfig || true
          find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*driver*visual*' -exec cp {} android-role-shell/arabic-visual/driver-visual.apk \;
          find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*merchant*visual*' -exec cp {} android-role-shell/arabic-visual/merchant-visual.apk \;
          test -s android-role-shell/arabic-visual/driver-visual.apk
          test -s android-role-shell/arabic-visual/merchant-visual.apk

      - name: Boot Android 16 and wait for local network
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/daynight-arabic-avd"
          mkdir -p "$ANDROID_AVD_HOME" android-role-shell/arabic-visual/emulator
          echo no | avdmanager create avd --force --name daynight_arabic_api36 --package "system-images;android-36;google_apis;x86_64" --path "$ANDROID_AVD_HOME/daynight_arabic_api36.avd"
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm || true; fi
          nohup "$ANDROID_HOME/emulator/emulator" -avd daynight_arabic_api36 -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-metrics -wipe-data > android-role-shell/arabic-visual/emulator/boot.log 2>&1 &
          echo $! > android-role-shell/arabic-visual/emulator/pid
          timeout 180 adb wait-for-device
          for attempt in $(seq 1 180); do
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
            sleep 5
          done
          [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]
          adb shell settings delete global http_proxy || true
          reachable=""
          for attempt in $(seq 1 60); do
            if adb shell ping -c 1 -W 2 10.0.2.2 >/dev/null 2>&1; then
              reachable="1"
              break
            fi
            sleep 2
          done
          test "$reachable" = "1"
          adb shell dumpsys connectivity > android-role-shell/arabic-visual/emulator/connectivity.txt || true
          sleep 8

      - name: Capture Driver Arabic splash handoff
        shell: bash
        run: |
          set -euo pipefail
          adb install -r android-role-shell/arabic-visual/driver-visual.apk | tee android-role-shell/arabic-visual/driver-install.log
          adb shell am force-stop com.daynightae.driver
          adb shell am start -n com.daynightae.driver/com.daynightae.shell.VisualTestActivity > android-role-shell/arabic-visual/driver-start.log
          sleep 0.35
          adb exec-out screencap -p > android-role-shell/arabic-visual/driver-stage-01.png
          sleep 0.65
          adb exec-out screencap -p > android-role-shell/arabic-visual/driver-stage-02.png
          sleep 0.9
          adb exec-out screencap -p > android-role-shell/arabic-visual/driver-stage-03.png
          sleep 5
          adb exec-out screencap -p > android-role-shell/arabic-visual/driver-arabic-final.png
          python android-role-shell/scripts/assert_portal_screen.py android-role-shell/arabic-visual/driver-arabic-final.png --report android-role-shell/arabic-visual/driver-arabic-final.json --role driver
          adb shell am force-stop com.daynightae.driver

      - name: Capture Merchant Arabic splash handoff
        shell: bash
        run: |
          set -euo pipefail
          adb install -r android-role-shell/arabic-visual/merchant-visual.apk | tee android-role-shell/arabic-visual/merchant-install.log
          adb shell am force-stop com.daynightae.merchant
          adb shell am start -n com.daynightae.merchant/com.daynightae.shell.VisualTestActivity > android-role-shell/arabic-visual/merchant-start.log
          sleep 0.35
          adb exec-out screencap -p > android-role-shell/arabic-visual/merchant-stage-01.png
          sleep 0.65
          adb exec-out screencap -p > android-role-shell/arabic-visual/merchant-stage-02.png
          sleep 0.9
          adb exec-out screencap -p > android-role-shell/arabic-visual/merchant-stage-03.png
          sleep 5
          adb exec-out screencap -p > android-role-shell/arabic-visual/merchant-arabic-final.png
          python android-role-shell/scripts/assert_portal_screen.py android-role-shell/arabic-visual/merchant-arabic-final.png --report android-role-shell/arabic-visual/merchant-arabic-final.json --role merchant
          adb shell am force-stop com.daynightae.merchant

      - name: Validate splash handoff and staged screenshots
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageChops, ImageStat

          staged = sorted(Path('android-role-shell/arabic-visual').glob('*-stage-*.png'))
          assert len(staged) == 6
          for path in staged:
              image = Image.open(path).convert('RGB').resize((160, 280))
              colors = image.getcolors(160 * 280)
              count = len(colors or [])
              assert count > 25, f'{path} is visually empty ({count} colors)'
              print(path, count)

          for role in ('driver', 'merchant'):
              splash = Image.open(f'android-role-shell/arabic-visual/{role}-stage-02.png').convert('RGB').resize((240, 420))
              final = Image.open(f'android-role-shell/arabic-visual/{role}-arabic-final.png').convert('RGB').resize((240, 420))
              difference = ImageStat.Stat(ImageChops.difference(splash, final)).mean
              mean_difference = sum(difference) / len(difference)
              assert mean_difference > 12, f'{role} remained visually trapped on splash ({mean_difference:.2f})'
              dark_pixels = sum(1 for r, g, b in final.getdata() if r < 45 and g < 70 and b < 105)
              dark_ratio = dark_pixels / (final.width * final.height)
              assert dark_ratio < 0.94, f'{role} final screen is still almost entirely the navy splash ({dark_ratio:.3f})'
              print(role, 'mean_difference=', round(mean_difference, 2), 'dark_ratio=', round(dark_ratio, 3))
          PY

      - name: Stop emulator and local server
        if: always()
        shell: bash
        run: |
          adb emu kill || true
          if [ -f android-role-shell/arabic-visual/emulator/pid ]; then kill "$(cat android-role-shell/arabic-visual/emulator/pid)" 2>/dev/null || true; fi
          if [ -f android-role-shell/arabic-visual/local-web.pid ]; then kill "$(cat android-role-shell/arabic-visual/local-web.pid)" 2>/dev/null || true; fi

      - name: Upload Arabic branch-build visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Arabic-Branch-Visual-v1.1.1
          path: android-role-shell/arabic-visual/
          if-no-files-found: error
          retention-days: 30
