name: Android Role v1.1.4 Visual Acceptance

on:
  pull_request:
    paths:
      - "artifacts/day-night-delivery/**"
      - "android-role-shell/**"
      - ".github/workflows/android-role-arabic-visual.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-role-v114-visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  role-visual:
    name: Android ${{ matrix.android_release }} ${{ matrix.role }} surface
    runs-on: ubuntu-latest
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        include:
          - api: 34
            android_release: 14
            role: driver
            package_name: com.daynightae.driver
            gradle_task: assembleDriverVisual
          - api: 34
            android_release: 14
            role: merchant
            package_name: com.daynightae.merchant
            gradle_task: assembleMerchantVisual
          - api: 36
            android_release: 16
            role: driver
            package_name: com.daynightae.driver
            gradle_task: assembleDriverVisual
          - api: 36
            android_release: 16
            role: merchant
            package_name: com.daynightae.merchant
            gradle_task: assembleMerchantVisual

    env:
      VITE_SUPABASE_URL: https://ngdwybpgacauorygoedi.supabase.co
      VITE_SUPABASE_ANON_KEY: ""
      VITE_DRIVER_RUNTIME_VISUAL_TEST: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build and serve the exact PR application
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm run web:typecheck
          pnpm run web:build
          test -s artifacts/day-night-delivery/dist/public/index.html
          grep -F '<BrowserRouter>' artifacts/day-night-delivery/src/main.tsx
          grep -F 'return role === "driver" ? <DriverPortal /> : <MerchantPortal />' artifacts/day-night-delivery/src/components/native/NativeRoleRoot.tsx
          grep -F 'data-driver-runtime-acceptance="ready"' artifacts/day-night-delivery/src/components/native/DriverRuntimeVisualAcceptance.tsx
          grep -F 'data-driver-map-ready' artifacts/day-night-delivery/src/components/tracking/TrackingMap.tsx
          grep -F 'localAssets.logo' artifacts/day-night-delivery/src/portal-designs/merchant/MerchantDesktopSidebar.tsx
          grep -F 'localAssets.logo' artifacts/day-night-delivery/src/portal-designs/merchant/MerchantHeader.tsx
          if grep -R -F 'left","-200vw' android-role-shell/app/src/main/java artifacts/day-night-delivery/src/components/native; then
            echo 'Off-screen authentication bridge remains in production source.'
            exit 1
          fi
          out="android-role-shell/visual-api${{ matrix.api }}-${{ matrix.role }}"
          mkdir -p "$out"
          nohup pnpm --dir artifacts/day-night-delivery exec vite preview --host 0.0.0.0 --port 4173 --strictPort > "$out/local-web.log" 2>&1 &
          echo $! > "$out/local-web.pid"
          for attempt in $(seq 1 60); do
            curl -fsS "http://127.0.0.1:4173/${{ matrix.role }}?nativeShell=${{ matrix.role }}&nosplash=1&lang=ar" | grep -F 'id="root"' >/dev/null && break
            sleep 1
          done
          curl -fsS "http://127.0.0.1:4173/${{ matrix.role }}?nativeShell=${{ matrix.role }}&nosplash=1&lang=ar" | grep -F 'id="root"' >/dev/null

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android ${{ matrix.android_release }} and image tools
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" \
            "emulator" \
            "system-images;android-${{ matrix.api }};google_apis;x86_64"
          python -m pip install --disable-pip-version-check "pillow>=10,<13"
          python android-role-shell/scripts/prepare_icons.py

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build isolated ${{ matrix.role }} visual APK
        shell: bash
        env:
          DAYNIGHT_ROLE_WEB_BASE_URL: http://10.0.2.2:4173
          DAYNIGHT_ROLE_VISUAL_QUERY: lang=ar
        run: |
          set -euo pipefail
          out="android-role-shell/visual-api${{ matrix.api }}-${{ matrix.role }}"
          gradle -p android-role-shell --no-daemon --console=plain ${{ matrix.gradle_task }}
          find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*${{ matrix.role }}*visual*' -exec cp {} "$out/${{ matrix.role }}-visual.apk" \;
          test -s "$out/${{ matrix.role }}-visual.apk"

      - name: Boot Android ${{ matrix.android_release }} tablet
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/daynight-v114-api${{ matrix.api }}-${{ matrix.role }}-avd"
          out="android-role-shell/visual-api${{ matrix.api }}-${{ matrix.role }}"
          mkdir -p "$ANDROID_AVD_HOME" "$out/emulator"
          echo no | avdmanager create avd --force \
            --name daynight_v114_api${{ matrix.api }}_${{ matrix.role }} \
            --package "system-images;android-${{ matrix.api }};google_apis;x86_64" \
            --path "$ANDROID_AVD_HOME/daynight_v114_api${{ matrix.api }}_${{ matrix.role }}.avd"
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm || true; fi
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd daynight_v114_api${{ matrix.api }}_${{ matrix.role }} \
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-metrics -wipe-data -memory 2048 \
            > "$out/emulator/boot.log" 2>&1 &
          echo $! > "$out/emulator/pid"
          timeout 240 adb wait-for-device
          for attempt in $(seq 1 180); do
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
            sleep 5
          done
          [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]
          adb shell settings delete global http_proxy || true
          adb shell settings put system accelerometer_rotation 0 || true
          adb shell settings put system user_rotation 0 || true
          adb shell wm size 800x1280
          adb shell wm density 160
          adb shell getprop ro.build.version.release | tee "$out/android-release.txt"
          adb shell getprop ro.build.version.sdk | tee "$out/android-sdk.txt"
          grep -Fx "${{ matrix.android_release }}" "$out/android-release.txt"
          grep -Fx "${{ matrix.api }}" "$out/android-sdk.txt"
          sleep 8

      - name: Capture real ${{ matrix.role }} surface
        shell: bash
        run: |
          set -euo pipefail
          out="android-role-shell/visual-api${{ matrix.api }}-${{ matrix.role }}"
          role="${{ matrix.role }}"
          package_name="${{ matrix.package_name }}"
          apk="$out/${role}-visual.apk"
          remote_png="/sdcard/${role}-arabic-api${{ matrix.api }}.png"
          local_png="$out/${role}-arabic-api${{ matrix.api }}.png"

          adb install -r "$apk" | tee "$out/${role}-install.log"
          grep -F 'Success' "$out/${role}-install.log"
          adb shell am force-stop "$package_name"
          adb logcat -c
          adb shell am start -W -n "$package_name/com.daynightae.shell.VisualTestActivity" > "$out/${role}-start.log"

          ready=""
          for attempt in $(seq 1 75); do
            adb logcat -d -s DAYNIGHT_VISUAL:I DAYNIGHT_CONSOLE:I '*:S' > "$out/${role}-runtime.log" || true
            if [ "$role" = "driver" ]; then
              if grep -F '\"roleReady\":true' "$out/${role}-runtime.log" >/dev/null \
                && grep -F '\"driverRuntime\":true' "$out/${role}-runtime.log" >/dev/null \
                && grep -F '\"map\":true' "$out/${role}-runtime.log" >/dev/null \
                && grep -F '\"vehicle\":true' "$out/${role}-runtime.log" >/dev/null; then
                ready=1
                break
              fi
            else
              if grep -F '\"roleReady\":true' "$out/${role}-runtime.log" >/dev/null \
                && { grep -F '\"merchantLogin\":true' "$out/${role}-runtime.log" >/dev/null \
                  || grep -F '\"merchantApp\":true' "$out/${role}-runtime.log" >/dev/null; }; then
                ready=1
                break
              fi
            fi
            sleep 1
          done

          cat "$out/${role}-runtime.log"
          test "$ready" = "1"
          sleep 2
          adb shell dumpsys gfxinfo "$package_name" > "$out/${role}-gfxinfo.txt" || true
          adb exec-out screencap -p > "$local_png"
          test -s "$local_png"
          python android-role-shell/scripts/assert_portal_screen.py \
            "$local_png" \
            --report "$out/${role}-arabic-api${{ matrix.api }}.json" \
            --role "$role"
          adb shell am force-stop "$package_name"

      - name: Validate screenshot contains the real surface
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          api = "${{ matrix.api }}"
          role = "${{ matrix.role }}"
          root = Path(f"android-role-shell/visual-api{api}-{role}")
          image = Image.open(root / f"{role}-arabic-api{api}.png").convert("RGB").resize((240, 420))
          colors = image.getcolors(image.width * image.height)
          assert colors and len(colors) > 40, f"{role} API {api} screenshot is visually empty"
          pixels = list(image.getdata())
          cream = sum(1 for r, g, b in pixels if r > 225 and g > 220 and b > 200) / len(pixels)
          dark = sum(1 for r, g, b in pixels if r < 45 and g < 70 and b < 105) / len(pixels)
          assert cream < 0.94, f"{role} API {api} remained an almost blank cream screen: {cream:.3f}"
          assert dark < 0.97, f"{role} API {api} remained an almost blank navy screen: {dark:.3f}"
          print(role, api, "colors", len(colors), "cream", round(cream, 3), "dark", round(dark, 3))
          PY

      - name: Stop emulator and local server
        if: always()
        shell: bash
        run: |
          out="android-role-shell/visual-api${{ matrix.api }}-${{ matrix.role }}"
          adb emu kill || true
          if [ -f "$out/emulator/pid" ]; then kill "$(cat "$out/emulator/pid")" 2>/dev/null || true; fi
          if [ -f "$out/local-web.pid" ]; then kill "$(cat "$out/local-web.pid")" 2>/dev/null || true; fi

      - name: Upload Android ${{ matrix.android_release }} ${{ matrix.role }} evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-v1.1.4-Android-${{ matrix.android_release }}-${{ matrix.role }}-Evidence
          path: android-role-shell/visual-api${{ matrix.api }}-${{ matrix.role }}/
          if-no-files-found: error
          retention-days: 30
