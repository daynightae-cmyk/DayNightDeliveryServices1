name: Android Role Apps v1.1.3

on:
  pull_request:
    paths:
      - "android-role-shell/**"
      - ".github/workflows/android-role-apps-v113.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-role-apps-v113-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-launch-v113:
    name: Build and launch Driver and Merchant v1.1.3
    runs-on: ubuntu-latest
    timeout-minutes: 80

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK and tools
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" "emulator" "system-images;android-36;google_apis;x86_64"
          python -m pip install --disable-pip-version-check "pillow>=10,<13"

      - name: Prepare official icons
        shell: bash
        run: |
          set -euo pipefail
          python android-role-shell/scripts/prepare_icons.py
          test -s android-role-shell/app/src/driver/res/drawable-nodpi/app_icon.png
          test -s android-role-shell/app/src/merchant/res/drawable-nodpi/app_icon.png

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Verify v1.1.3 routing contract
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'versionCode 6' android-role-shell/app/build.gradle
          grep -F 'versionName "1.1.3"' android-role-shell/app/build.gradle
          grep -F 'roleRuntimeVersion = "1.1.3"' android-role-shell/app/build.gradle
          grep -F 'dnNativeRole=driver' android-role-shell/app/build.gradle
          grep -F 'role == "driver" && !roleVisualQuery' android-role-shell/app/build.gradle
          grep -F 'applicationId "com.daynightae.driver"' android-role-shell/app/build.gradle
          grep -F 'applicationId "com.daynightae.merchant"' android-role-shell/app/build.gradle

      - name: Build and lint APK and AAB packages
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace clean assembleDriverDebug assembleMerchantDebug bundleDriverRelease bundleMerchantRelease lintDriverRelease lintMerchantRelease

      - name: Stage and verify v1.1.3 packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android-role-shell/dist-v113 android-role-shell/screens-v113 android-role-shell/emulator-v113
          DRIVER_APK="$(find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*driver*debug*' | head -n 1)"
          MERCHANT_APK="$(find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*merchant*debug*' | head -n 1)"
          DRIVER_AAB="$(find android-role-shell/app/build/outputs/bundle -type f -name '*.aab' -path '*driverRelease*' | head -n 1)"
          MERCHANT_AAB="$(find android-role-shell/app/build/outputs/bundle -type f -name '*.aab' -path '*merchantRelease*' | head -n 1)"
          test -s "$DRIVER_APK" && test -s "$MERCHANT_APK" && test -s "$DRIVER_AAB" && test -s "$MERCHANT_AAB"
          cp "$DRIVER_APK" android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3.apk
          cp "$MERCHANT_APK" android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3.apk
          cp "$DRIVER_AAB" android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3.aab
          cp "$MERCHANT_AAB" android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3.aab
          AAPT="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          "$AAPT" dump badging android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3.apk > android-role-shell/dist-v113/driver-badging.txt
          "$AAPT" dump badging android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3.apk > android-role-shell/dist-v113/merchant-badging.txt
          grep -F "package: name='com.daynightae.driver'" android-role-shell/dist-v113/driver-badging.txt
          grep -F "versionName='1.1.3'" android-role-shell/dist-v113/driver-badging.txt
          grep -F "package: name='com.daynightae.merchant'" android-role-shell/dist-v113/merchant-badging.txt
          grep -F "versionName='1.1.3'" android-role-shell/dist-v113/merchant-badging.txt
          unzip -t android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3.aab >/dev/null
          unzip -t android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3.aab >/dev/null
          (cd android-role-shell/dist-v113 && sha256sum DAY-NIGHT-Driver-v1.1.3.apk DAY-NIGHT-Driver-v1.1.3.aab > DAY-NIGHT-Driver-v1.1.3.sha256)
          (cd android-role-shell/dist-v113 && sha256sum DAY-NIGHT-Merchant-v1.1.3.apk DAY-NIGHT-Merchant-v1.1.3.aab > DAY-NIGHT-Merchant-v1.1.3.sha256)

      - name: Boot Android 16
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/daynight-v113-avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd --force --name daynight_v113_api36 --package "system-images;android-36;google_apis;x86_64" --path "$ANDROID_AVD_HOME/daynight_v113_api36.avd"
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm || true; fi
          nohup "$ANDROID_HOME/emulator/emulator" -avd daynight_v113_api36 -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-metrics -wipe-data > android-role-shell/emulator-v113/boot.log 2>&1 &
          echo $! > android-role-shell/emulator-v113/pid
          timeout 180 adb wait-for-device
          for attempt in $(seq 1 180); do
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
            sleep 5
          done
          [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]
          adb shell settings delete global http_proxy || true
          sleep 8

      - name: Launch-test production Driver and Merchant routes
        id: live_launch
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test_role() {
            role="$1"
            role_lower="$(echo "$role" | tr '[:upper:]' '[:lower:]')"
            package_name="$2"
            apk="android-role-shell/dist-v113/DAY-NIGHT-${role}-v1.1.3.apk"
            adb install -r "$apk" | tee "android-role-shell/dist-v113/${role_lower}-install.txt"
            grep -F 'Success' "android-role-shell/dist-v113/${role_lower}-install.txt"
            adb shell am force-stop "$package_name"
            adb logcat -c
            adb shell monkey -p "$package_name" 1 > "android-role-shell/dist-v113/${role_lower}-launch.txt"
            sleep 20
            adb shell pidof "$package_name" > "android-role-shell/dist-v113/${role_lower}-pid.txt"
            adb logcat -d > "android-role-shell/dist-v113/${role_lower}-logcat.txt" || true
            adb exec-out screencap -p > "android-role-shell/screens-v113/${role_lower}-live-v1.1.3.png"
            test -s "android-role-shell/dist-v113/${role_lower}-pid.txt"
            python android-role-shell/scripts/assert_portal_screen.py "android-role-shell/screens-v113/${role_lower}-live-v1.1.3.png" --report "android-role-shell/screens-v113/${role_lower}-live-v1.1.3.json" --role "$role_lower"
            adb shell am force-stop "$package_name"
          }
          test_role Driver com.daynightae.driver
          test_role Merchant com.daynightae.merchant

      - name: Create final bundle
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          files=(DAY-NIGHT-Driver-v1.1.3.apk DAY-NIGHT-Driver-v1.1.3.aab DAY-NIGHT-Driver-v1.1.3.sha256 DAY-NIGHT-Merchant-v1.1.3.apk DAY-NIGHT-Merchant-v1.1.3.aab DAY-NIGHT-Merchant-v1.1.3.sha256 driver-badging.txt merchant-badging.txt)
          if [ -s android-role-shell/screens-v113/driver-live-v1.1.3.png ]; then
            cp android-role-shell/screens-v113/driver-live-v1.1.3.png android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3-Live-Test.png
            files+=(DAY-NIGHT-Driver-v1.1.3-Live-Test.png)
          fi
          if [ -s android-role-shell/screens-v113/merchant-live-v1.1.3.png ]; then
            cp android-role-shell/screens-v113/merchant-live-v1.1.3.png android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3-Live-Test.png
            files+=(DAY-NIGHT-Merchant-v1.1.3-Live-Test.png)
          fi
          (cd android-role-shell/dist-v113 && zip -9 DAY-NIGHT-Android-Apps-v1.1.3-FINAL.zip "${files[@]}")
          (cd android-role-shell/dist-v113 && sha256sum DAY-NIGHT-Android-Apps-v1.1.3-FINAL.zip > DAY-NIGHT-Android-Apps-v1.1.3-FINAL.zip.sha256)

      - name: Stop emulator
        if: always()
        shell: bash
        run: |
          adb emu kill || true
          if [ -f android-role-shell/emulator-v113/pid ]; then kill "$(cat android-role-shell/emulator-v113/pid)" 2>/dev/null || true; fi

      - name: Upload Driver v1.1.3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Driver-v1.1.3
          path: |
            android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3.apk
            android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3.aab
            android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3.sha256
            android-role-shell/dist-v113/DAY-NIGHT-Driver-v1.1.3-Live-Test.png
            android-role-shell/dist-v113/driver-*
            android-role-shell/screens-v113/driver-*
          if-no-files-found: error
          retention-days: 30

      - name: Upload Merchant v1.1.3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Merchant-v1.1.3
          path: |
            android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3.apk
            android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3.aab
            android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3.sha256
            android-role-shell/dist-v113/DAY-NIGHT-Merchant-v1.1.3-Live-Test.png
            android-role-shell/dist-v113/merchant-*
            android-role-shell/screens-v113/merchant-*
          if-no-files-found: error
          retention-days: 30

      - name: Upload complete v1.1.3 bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Android-Apps-v1.1.3-FINAL
          path: |
            android-role-shell/dist-v113/DAY-NIGHT-Android-Apps-v1.1.3-FINAL.zip
            android-role-shell/dist-v113/DAY-NIGHT-Android-Apps-v1.1.3-FINAL.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Fail when live-route validation failed
        if: steps.live_launch.outcome == 'failure'
        shell: bash
        run: |
          echo 'One live production-route screenshot failed validation. Diagnostics were uploaded.'
          exit 1
