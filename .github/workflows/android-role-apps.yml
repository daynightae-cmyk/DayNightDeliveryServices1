name: Android Role Apps

on:
  push:
    branches:
      - main
      - fix/role-app-core-v1-1
    paths:
      - "android-role-shell/**"
      - "artifacts/day-night-delivery/index.html"
      - "artifacts/day-night-delivery/src/i18n/**"
      - "artifacts/day-night-delivery/src/lib/AppContext.tsx"
      - "artifacts/day-night-delivery/src/portal-designs/merchant/**"
      - "artifacts/day-night-delivery/src/styles/dn-merchant-mobile-drawer-final.css"
      - "artifacts/day-night-delivery/src/styles/dn-driver-mobile-runtime-final.css"
      - ".github/workflows/android-role-apps.yml"
  pull_request:
    paths:
      - "android-role-shell/**"
      - "artifacts/day-night-delivery/index.html"
      - "artifacts/day-night-delivery/src/i18n/**"
      - "artifacts/day-night-delivery/src/lib/AppContext.tsx"
      - "artifacts/day-night-delivery/src/portal-designs/merchant/**"
      - "artifacts/day-night-delivery/src/styles/dn-merchant-mobile-drawer-final.css"
      - "artifacts/day-night-delivery/src/styles/dn-driver-mobile-runtime-final.css"
      - ".github/workflows/android-role-apps.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-role-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-role-apps:
    name: Build and visually verify Driver and Merchant v1.1.0
    runs-on: ubuntu-latest
    timeout-minutes: 80

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK and emulator
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" \
            "emulator" \
            "system-images;android-36;google_apis;x86_64"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare official icons and image checks
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "pillow>=10,<13"
          python android-role-shell/scripts/prepare_icons.py
          test -s android-role-shell/app/src/driver/res/drawable-nodpi/app_icon.png
          test -s android-role-shell/app/src/merchant/res/drawable-nodpi/app_icon.png
          test -s android-role-shell/scripts/assert_portal_screen.py

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Validate v1.1.0 role application contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'compileSdk 36' android-role-shell/app/build.gradle
          grep -F 'targetSdk 36' android-role-shell/app/build.gradle
          grep -F 'versionCode 3' android-role-shell/app/build.gradle
          grep -F 'versionName "1.1.0"' android-role-shell/app/build.gradle
          grep -F 'applicationId "com.daynightae.driver"' android-role-shell/app/build.gradle
          grep -F 'applicationId "com.daynightae.merchant"' android-role-shell/app/build.gradle
          grep -F '/driver?nativeShell=driver&nosplash=1' android-role-shell/app/build.gradle
          grep -F '/merchant?nativeShell=merchant&nosplash=1' android-role-shell/app/build.gradle
          grep -F 'data-language' artifacts/day-night-delivery/index.html
          grep -F 'dn-role-boot' artifacts/day-night-delivery/index.html
          grep -F 'dn-merchant-mobile-drawer-group nav > button' artifacts/day-night-delivery/src/styles/dn-merchant-mobile-drawer-final.css
          grep -F 'grid-template-columns: minmax(0,1fr)' artifacts/day-night-delivery/src/styles/dn-driver-mobile-runtime-final.css
          grep -F 'background: #f7f5ea !important' artifacts/day-night-delivery/src/styles/dn-driver-mobile-runtime-final.css
          if grep -F 'html:has(.dn-driver-exact-shell) .dn-driver-exact-shell .dn-driver-workspace-v3' artifacts/day-night-delivery/src/styles/dn-driver-mobile-runtime-final.css; then
            echo "The authenticated driver workspace must never be covered by the legacy navy root selector."
            exit 1
          fi

      - name: Build Driver debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace clean assembleDriverDebug 2>&1 | tee android-role-shell/driver-debug-build.log

      - name: Build Merchant debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace assembleMerchantDebug 2>&1 | tee android-role-shell/merchant-debug-build.log

      - name: Build release AAB files
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace bundleDriverRelease bundleMerchantRelease 2>&1 | tee android-role-shell/release-bundle-build.log

      - name: Run Android lint
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace lintDriverRelease lintMerchantRelease 2>&1 | tee android-role-shell/android-lint-build.log

      - name: Stage and verify release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android-role-shell/dist android-role-shell/screens
          DRIVER_APK="$(find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*driver*debug*' | head -n 1)"
          MERCHANT_APK="$(find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*merchant*debug*' | head -n 1)"
          DRIVER_AAB="$(find android-role-shell/app/build/outputs/bundle -type f -name '*.aab' -path '*driverRelease*' | head -n 1)"
          MERCHANT_AAB="$(find android-role-shell/app/build/outputs/bundle -type f -name '*.aab' -path '*merchantRelease*' | head -n 1)"
          test -s "$DRIVER_APK" && test -s "$MERCHANT_APK" && test -s "$DRIVER_AAB" && test -s "$MERCHANT_AAB"
          cp "$DRIVER_APK" android-role-shell/dist/DAY-NIGHT-Driver-v1.1.0.apk
          cp "$MERCHANT_APK" android-role-shell/dist/DAY-NIGHT-Merchant-v1.1.0.apk
          cp "$DRIVER_AAB" android-role-shell/dist/DAY-NIGHT-Driver-v1.1.0.aab
          cp "$MERCHANT_AAB" android-role-shell/dist/DAY-NIGHT-Merchant-v1.1.0.aab
          AAPT="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          "$AAPT" dump badging android-role-shell/dist/DAY-NIGHT-Driver-v1.1.0.apk | tee android-role-shell/dist/driver-badging.txt
          "$AAPT" dump badging android-role-shell/dist/DAY-NIGHT-Merchant-v1.1.0.apk | tee android-role-shell/dist/merchant-badging.txt
          grep -F "package: name='com.daynightae.driver'" android-role-shell/dist/driver-badging.txt
          grep -F "versionName='1.1.0'" android-role-shell/dist/driver-badging.txt
          grep -F "application-label:'DAY NIGHT Driver'" android-role-shell/dist/driver-badging.txt
          grep -F "package: name='com.daynightae.merchant'" android-role-shell/dist/merchant-badging.txt
          grep -F "versionName='1.1.0'" android-role-shell/dist/merchant-badging.txt
          grep -F "application-label:'DAY NIGHT Merchant'" android-role-shell/dist/merchant-badging.txt
          unzip -t android-role-shell/dist/DAY-NIGHT-Driver-v1.1.0.aab >/dev/null
          unzip -t android-role-shell/dist/DAY-NIGHT-Merchant-v1.1.0.aab >/dev/null
          (cd android-role-shell/dist && sha256sum DAY-NIGHT-Driver-v1.1.0.apk DAY-NIGHT-Driver-v1.1.0.aab > DAY-NIGHT-Driver-v1.1.0.sha256)
          (cd android-role-shell/dist && sha256sum DAY-NIGHT-Merchant-v1.1.0.apk DAY-NIGHT-Merchant-v1.1.0.aab > DAY-NIGHT-Merchant-v1.1.0.sha256)

      - name: Configure KVM
        shell: bash
        run: |
          if [ -e /dev/kvm ]; then
            sudo chown "$(id -u):$(id -g)" /dev/kvm || true
            sudo chmod 666 /dev/kvm || true
          fi

      - name: Boot Arabic Android 16 emulator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android-role-shell/emulator
          export ANDROID_AVD_HOME="$RUNNER_TEMP/daynight-avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd --force --name daynight_api36 --package "system-images;android-36;google_apis;x86_64" --path "$ANDROID_AVD_HOME/daynight_api36.avd" | tee android-role-shell/emulator/avdmanager-create.log
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd daynight_api36 -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-metrics -wipe-data \
            -prop persist.sys.locale=ar-AE -prop persist.sys.language=ar -prop persist.sys.country=AE \
            > android-role-shell/emulator/emulator-api36.log 2>&1 &
          echo $! > android-role-shell/emulator/emulator.pid
          timeout 180 adb wait-for-device
          booted=""
          for attempt in $(seq 1 180); do
            booted="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            [ "$booted" = "1" ] && break
            if ! kill -0 "$(cat android-role-shell/emulator/emulator.pid)" 2>/dev/null; then
              tail -n 400 android-role-shell/emulator/emulator-api36.log || true
              exit 1
            fi
            sleep 5
          done
          [ "$booted" = "1" ]
          adb shell getprop ro.build.version.release | tee android-role-shell/emulator/android-release.log
          adb shell getprop ro.build.version.sdk | tee android-role-shell/emulator/android-sdk.log
          adb shell getprop persist.sys.locale | tee android-role-shell/emulator/android-locale.log
          grep -Fx "16" android-role-shell/emulator/android-release.log
          grep -Fx "36" android-role-shell/emulator/android-sdk.log

      - name: Install and inspect Driver v1.1.0
        shell: bash
        run: |
          set -euo pipefail
          adb install -r android-role-shell/dist/DAY-NIGHT-Driver-v1.1.0.apk | tee android-role-shell/driver-install.log
          grep -F "Success" android-role-shell/driver-install.log
          adb shell am force-stop com.daynightae.driver
          adb shell monkey -p com.daynightae.driver 1 >/dev/null
          sleep 1
          adb exec-out screencap -p > android-role-shell/screens/driver-splash-v1.1.0.png
          adb shell dumpsys package com.daynightae.driver | grep -F "versionName=1.1.0" | tee android-role-shell/driver-launch.log
          sleep 24
          adb shell pidof com.daynightae.driver | tee -a android-role-shell/driver-launch.log
          adb exec-out screencap -p > android-role-shell/screens/driver-v1.1.0.png
          python android-role-shell/scripts/assert_portal_screen.py android-role-shell/screens/driver-v1.1.0.png --report android-role-shell/screens/driver-v1.1.0.json --role driver
          adb shell uiautomator dump /sdcard/driver-window.xml || true
          adb pull /sdcard/driver-window.xml android-role-shell/screens/driver-window.xml || true
          adb shell am force-stop com.daynightae.driver

      - name: Install and inspect Merchant v1.1.0
        shell: bash
        run: |
          set -euo pipefail
          adb install -r android-role-shell/dist/DAY-NIGHT-Merchant-v1.1.0.apk | tee android-role-shell/merchant-install.log
          grep -F "Success" android-role-shell/merchant-install.log
          adb shell am force-stop com.daynightae.merchant
          adb shell monkey -p com.daynightae.merchant 1 >/dev/null
          sleep 1
          adb exec-out screencap -p > android-role-shell/screens/merchant-splash-v1.1.0.png
          adb shell dumpsys package com.daynightae.merchant | grep -F "versionName=1.1.0" | tee android-role-shell/merchant-launch.log
          sleep 24
          adb shell pidof com.daynightae.merchant | tee -a android-role-shell/merchant-launch.log
          adb exec-out screencap -p > android-role-shell/screens/merchant-v1.1.0.png
          python android-role-shell/scripts/assert_portal_screen.py android-role-shell/screens/merchant-v1.1.0.png --report android-role-shell/screens/merchant-v1.1.0.json --role merchant
          adb shell uiautomator dump /sdcard/merchant-window.xml || true
          adb pull /sdcard/merchant-window.xml android-role-shell/screens/merchant-window.xml || true
          adb shell am force-stop com.daynightae.merchant

      - name: Validate splash screenshots
        shell: bash
        run: |
          python - <<'PY'
          from PIL import Image
          for path in [
              'android-role-shell/screens/driver-splash-v1.1.0.png',
              'android-role-shell/screens/merchant-splash-v1.1.0.png',
          ]:
              image = Image.open(path).convert('RGB')
              colors = image.resize((160, 280)).getcolors(160 * 280)
              assert colors and len(colors) > 30, f'{path} is visually empty: {len(colors or [])} colors'
              print(path, image.size, len(colors))
          PY

      - name: Stop Android emulator
        if: always()
        shell: bash
        run: |
          adb emu kill || true
          if [ -f android-role-shell/emulator/emulator.pid ]; then kill "$(cat android-role-shell/emulator/emulator.pid)" 2>/dev/null || true; fi

      - name: Upload Driver v1.1.0
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Driver-v1.1.0
          path: |
            android-role-shell/dist/DAY-NIGHT-Driver-v1.1.0.apk
            android-role-shell/dist/DAY-NIGHT-Driver-v1.1.0.aab
            android-role-shell/dist/DAY-NIGHT-Driver-v1.1.0.sha256
            android-role-shell/dist/driver-badging.txt
            android-role-shell/driver-*.log
            android-role-shell/screens/driver-*
          if-no-files-found: error
          retention-days: 30

      - name: Upload Merchant v1.1.0
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Merchant-v1.1.0
          path: |
            android-role-shell/dist/DAY-NIGHT-Merchant-v1.1.0.apk
            android-role-shell/dist/DAY-NIGHT-Merchant-v1.1.0.aab
            android-role-shell/dist/DAY-NIGHT-Merchant-v1.1.0.sha256
            android-role-shell/dist/merchant-badging.txt
            android-role-shell/merchant-*.log
            android-role-shell/screens/merchant-*
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Android-Diagnostics-v1.1.0
          path: |
            android-role-shell/*-build.log
            android-role-shell/*-install.log
            android-role-shell/*-launch.log
            android-role-shell/emulator/
            android-role-shell/screens/
            android-role-shell/app/build/reports/
          if-no-files-found: warn
          retention-days: 14
