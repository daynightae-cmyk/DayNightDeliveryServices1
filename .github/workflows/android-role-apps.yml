name: Android Role Apps v1.1.4

on:
  push:
    branches: [main]
    paths:
      - "android-role-shell/**"
      - "artifacts/day-night-delivery/**"
      - ".github/workflows/android-role-apps.yml"
  pull_request:
    paths:
      - "android-role-shell/**"
      - "artifacts/day-night-delivery/**"
      - ".github/workflows/android-role-apps.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-role-apps-v114-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-role-apps:
    name: Build Driver and Merchant v1.1.4
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate production web application
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm run web:validate
          test -s artifacts/day-night-delivery/dist/public/index.html
          grep -F '<BrowserRouter>' artifacts/day-night-delivery/src/main.tsx
          grep -F 'return role === "driver" ? <DriverPortal /> : <MerchantPortal />' artifacts/day-night-delivery/src/components/native/NativeRoleRoot.tsx
          grep -F 'dn-driver-runtime-v114.css' artifacts/day-night-delivery/src/components/driver/DriverPortal.tsx
          grep -F 'localAssets.logo' artifacts/day-night-delivery/src/portal-designs/merchant/MerchantDesktopSidebar.tsx
          grep -F 'localAssets.logo' artifacts/day-night-delivery/src/portal-designs/merchant/MerchantHeader.tsx
          if grep -R -F 'left","-200vw' android-role-shell/app/src/main/java artifacts/day-night-delivery/src/components/native; then
            echo 'Synthetic off-screen authentication is forbidden.'
            exit 1
          fi
          if grep -R -F 'dn-driver-native-login' android-role-shell/app/src/main/java/com/daynightae/shell/DayNightApplication.java; then
            echo 'Synthetic Android credential bridge is forbidden.'
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and image tools
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          python -m pip install --disable-pip-version-check "pillow>=10,<13"
          python android-role-shell/scripts/prepare_icons.py
          test -s android-role-shell/app/src/driver/res/drawable-nodpi/app_icon.png
          test -s android-role-shell/app/src/merchant/res/drawable-nodpi/app_icon.png

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Verify Android v1.1.4 contract
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'compileSdk 36' android-role-shell/app/build.gradle
          grep -F 'targetSdk 36' android-role-shell/app/build.gradle
          grep -F 'versionCode 7' android-role-shell/app/build.gradle
          grep -F 'versionName "1.1.4"' android-role-shell/app/build.gradle
          grep -F 'roleRuntimeVersion = "1.1.4"' android-role-shell/app/build.gradle
          grep -F 'nativeShell=${role}' android-role-shell/app/build.gradle
          grep -F 'applicationId "com.daynightae.driver"' android-role-shell/app/build.gradle
          grep -F 'applicationId "com.daynightae.merchant"' android-role-shell/app/build.gradle

      - name: Build APK, AAB, and Android lint
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace \
            clean assembleDriverDebug assembleMerchantDebug \
            bundleDriverRelease bundleMerchantRelease \
            lintDriverRelease lintMerchantRelease

      - name: Stage and verify packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android-role-shell/dist-v114
          DRIVER_APK="$(find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*driver*debug*' | head -n 1)"
          MERCHANT_APK="$(find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*merchant*debug*' | head -n 1)"
          DRIVER_AAB="$(find android-role-shell/app/build/outputs/bundle -type f -name '*.aab' -path '*driverRelease*' | head -n 1)"
          MERCHANT_AAB="$(find android-role-shell/app/build/outputs/bundle -type f -name '*.aab' -path '*merchantRelease*' | head -n 1)"
          test -s "$DRIVER_APK" && test -s "$MERCHANT_APK" && test -s "$DRIVER_AAB" && test -s "$MERCHANT_AAB"
          cp "$DRIVER_APK" android-role-shell/dist-v114/DAY-NIGHT-Driver-v1.1.4.apk
          cp "$MERCHANT_APK" android-role-shell/dist-v114/DAY-NIGHT-Merchant-v1.1.4.apk
          cp "$DRIVER_AAB" android-role-shell/dist-v114/DAY-NIGHT-Driver-v1.1.4.aab
          cp "$MERCHANT_AAB" android-role-shell/dist-v114/DAY-NIGHT-Merchant-v1.1.4.aab
          AAPT="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          "$AAPT" dump badging android-role-shell/dist-v114/DAY-NIGHT-Driver-v1.1.4.apk > android-role-shell/dist-v114/driver-badging.txt
          "$AAPT" dump badging android-role-shell/dist-v114/DAY-NIGHT-Merchant-v1.1.4.apk > android-role-shell/dist-v114/merchant-badging.txt
          grep -F "package: name='com.daynightae.driver'" android-role-shell/dist-v114/driver-badging.txt
          grep -F "versionName='1.1.4'" android-role-shell/dist-v114/driver-badging.txt
          grep -F "package: name='com.daynightae.merchant'" android-role-shell/dist-v114/merchant-badging.txt
          grep -F "versionName='1.1.4'" android-role-shell/dist-v114/merchant-badging.txt
          unzip -t android-role-shell/dist-v114/DAY-NIGHT-Driver-v1.1.4.aab >/dev/null
          unzip -t android-role-shell/dist-v114/DAY-NIGHT-Merchant-v1.1.4.aab >/dev/null
          (cd android-role-shell/dist-v114 && sha256sum DAY-NIGHT-Driver-v1.1.4.apk DAY-NIGHT-Driver-v1.1.4.aab > DAY-NIGHT-Driver-v1.1.4.sha256)
          (cd android-role-shell/dist-v114 && sha256sum DAY-NIGHT-Merchant-v1.1.4.apk DAY-NIGHT-Merchant-v1.1.4.aab > DAY-NIGHT-Merchant-v1.1.4.sha256)
          (cd android-role-shell/dist-v114 && zip -9 DAY-NIGHT-Android-Apps-v1.1.4-FINAL.zip \
            DAY-NIGHT-Driver-v1.1.4.apk DAY-NIGHT-Driver-v1.1.4.aab DAY-NIGHT-Driver-v1.1.4.sha256 \
            DAY-NIGHT-Merchant-v1.1.4.apk DAY-NIGHT-Merchant-v1.1.4.aab DAY-NIGHT-Merchant-v1.1.4.sha256 \
            driver-badging.txt merchant-badging.txt)
          (cd android-role-shell/dist-v114 && sha256sum DAY-NIGHT-Android-Apps-v1.1.4-FINAL.zip > DAY-NIGHT-Android-Apps-v1.1.4-FINAL.zip.sha256)

      - name: Upload Driver v1.1.4
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Driver-v1.1.4
          path: |
            android-role-shell/dist-v114/DAY-NIGHT-Driver-v1.1.4.apk
            android-role-shell/dist-v114/DAY-NIGHT-Driver-v1.1.4.aab
            android-role-shell/dist-v114/DAY-NIGHT-Driver-v1.1.4.sha256
            android-role-shell/dist-v114/driver-badging.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload Merchant v1.1.4
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Merchant-v1.1.4
          path: |
            android-role-shell/dist-v114/DAY-NIGHT-Merchant-v1.1.4.apk
            android-role-shell/dist-v114/DAY-NIGHT-Merchant-v1.1.4.aab
            android-role-shell/dist-v114/DAY-NIGHT-Merchant-v1.1.4.sha256
            android-role-shell/dist-v114/merchant-badging.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload complete v1.1.4 bundle
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Android-Apps-v1.1.4-FINAL
          path: |
            android-role-shell/dist-v114/DAY-NIGHT-Android-Apps-v1.1.4-FINAL.zip
            android-role-shell/dist-v114/DAY-NIGHT-Android-Apps-v1.1.4-FINAL.zip.sha256
          if-no-files-found: error
          retention-days: 30
