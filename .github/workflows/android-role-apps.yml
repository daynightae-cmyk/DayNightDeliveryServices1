name: Android Role Apps

on:
  push:
    branches:
      - main
      - agent/mobile-role-apks
    paths:
      - "android-role-shell/**"
      - ".github/workflows/android-role-apps.yml"
  pull_request:
    paths:
      - "android-role-shell/**"
      - ".github/workflows/android-role-apps.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-role-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-role-apps:
    name: Build, install, and verify Driver and Merchant apps
    runs-on: ubuntu-latest
    timeout-minutes: 80

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK, emulator, and system image
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" \
            "emulator" \
            "system-images;android-36;google_apis;x86_64"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare official role icons
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "pillow>=10,<13"
          python android-role-shell/scripts/prepare_icons.py
          test -s android-role-shell/app/src/driver/res/drawable-nodpi/app_icon.png
          test -s android-role-shell/app/src/merchant/res/drawable-nodpi/app_icon.png

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Validate role isolation contract
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'compileSdk 36' android-role-shell/app/build.gradle
          grep -F 'targetSdk 36' android-role-shell/app/build.gradle
          grep -F 'applicationId "com.daynightae.driver"' android-role-shell/app/build.gradle
          grep -F 'applicationId "com.daynightae.merchant"' android-role-shell/app/build.gradle
          grep -F '/driver?nativeShell=driver&nosplash=1' android-role-shell/app/build.gradle
          grep -F '/merchant?nativeShell=merchant&nosplash=1' android-role-shell/app/build.gradle
          grep -F 'android:usesCleartextTraffic="false"' android-role-shell/app/src/main/AndroidManifest.xml
          grep -F 'request.deny()' android-role-shell/app/src/main/java/com/daynightae/shell/MainActivity.java

      - name: Build Driver debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace clean assembleDriverDebug 2>&1 | tee android-role-shell/driver-debug-build.log

      - name: Build Merchant debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace assembleMerchantDebug 2>&1 | tee android-role-shell/merchant-debug-build.log

      - name: Build Driver release AAB
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace bundleDriverRelease 2>&1 | tee android-role-shell/driver-release-build.log

      - name: Build Merchant release AAB
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace bundleMerchantRelease 2>&1 | tee android-role-shell/merchant-release-build.log

      - name: Run Android lint
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android-role-shell --no-daemon --console=plain --stacktrace lintDriverRelease lintMerchantRelease 2>&1 | tee android-role-shell/android-lint-build.log

      - name: Verify packages and stage release files
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android-role-shell/dist

          DRIVER_APK="$(find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*driver*debug*' | head -n 1)"
          MERCHANT_APK="$(find android-role-shell/app/build/outputs/apk -type f -name '*.apk' -path '*merchant*debug*' | head -n 1)"
          DRIVER_AAB="$(find android-role-shell/app/build/outputs/bundle -type f -name '*.aab' -path '*driverRelease*' | head -n 1)"
          MERCHANT_AAB="$(find android-role-shell/app/build/outputs/bundle -type f -name '*.aab' -path '*merchantRelease*' | head -n 1)"

          test -s "$DRIVER_APK"
          test -s "$MERCHANT_APK"
          test -s "$DRIVER_AAB"
          test -s "$MERCHANT_AAB"

          cp "$DRIVER_APK" android-role-shell/dist/DAY-NIGHT-Driver-v1.0.0.apk
          cp "$MERCHANT_APK" android-role-shell/dist/DAY-NIGHT-Merchant-v1.0.0.apk
          cp "$DRIVER_AAB" android-role-shell/dist/DAY-NIGHT-Driver-v1.0.0.aab
          cp "$MERCHANT_AAB" android-role-shell/dist/DAY-NIGHT-Merchant-v1.0.0.aab

          AAPT="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          test -x "$AAPT"
          "$AAPT" dump badging android-role-shell/dist/DAY-NIGHT-Driver-v1.0.0.apk | tee android-role-shell/dist/driver-badging.txt
          "$AAPT" dump badging android-role-shell/dist/DAY-NIGHT-Merchant-v1.0.0.apk | tee android-role-shell/dist/merchant-badging.txt

          grep -F "package: name='com.daynightae.driver'" android-role-shell/dist/driver-badging.txt
          grep -F "application-label:'DAY NIGHT Driver'" android-role-shell/dist/driver-badging.txt
          grep -F "package: name='com.daynightae.merchant'" android-role-shell/dist/merchant-badging.txt
          grep -F "application-label:'DAY NIGHT Merchant'" android-role-shell/dist/merchant-badging.txt

          unzip -t android-role-shell/dist/DAY-NIGHT-Driver-v1.0.0.aab >/dev/null
          unzip -t android-role-shell/dist/DAY-NIGHT-Merchant-v1.0.0.aab >/dev/null

          (
            cd android-role-shell/dist
            sha256sum DAY-NIGHT-Driver-v1.0.0.apk DAY-NIGHT-Driver-v1.0.0.aab > DAY-NIGHT-Driver-v1.0.0.sha256
            sha256sum DAY-NIGHT-Merchant-v1.0.0.apk DAY-NIGHT-Merchant-v1.0.0.aab > DAY-NIGHT-Merchant-v1.0.0.sha256
          )

          ls -lh android-role-shell/dist

      - name: Enable KVM for Android emulator
        shell: bash
        run: |
          set -euo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          test -r /dev/kvm
          test -w /dev/kvm

      - name: Create and boot Android 16 emulator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android-role-shell/emulator
          echo no | avdmanager create avd \
            --force \
            --name daynight_api36 \
            --package "system-images;android-36;google_apis;x86_64"

          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd daynight_api36 \
            -no-window \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -no-metrics \
            -wipe-data \
            > android-role-shell/emulator/emulator-api36.log 2>&1 &
          echo $! > android-role-shell/emulator/emulator.pid

          timeout 180 adb wait-for-device
          booted=""
          for attempt in $(seq 1 180); do
            booted="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            if [ "$booted" = "1" ]; then
              break
            fi
            if ! kill -0 "$(cat android-role-shell/emulator/emulator.pid)" 2>/dev/null; then
              echo "Android emulator process exited before boot completed."
              tail -n 400 android-role-shell/emulator/emulator-api36.log || true
              exit 1
            fi
            sleep 5
          done

          if [ "$booted" != "1" ]; then
            echo "Android 16 emulator did not finish booting within 15 minutes."
            adb devices -l || true
            tail -n 400 android-role-shell/emulator/emulator-api36.log || true
            exit 1
          fi

          adb devices -l | tee android-role-shell/emulator/adb-devices.log
          adb shell getprop ro.build.version.release | tee android-role-shell/emulator/android-release.log
          adb shell getprop ro.build.version.sdk | tee android-role-shell/emulator/android-sdk.log
          grep -Fx "16" android-role-shell/emulator/android-release.log
          grep -Fx "36" android-role-shell/emulator/android-sdk.log

      - name: Install and launch both APKs on Android 16
        shell: bash
        run: |
          set -euo pipefail
          adb install -r android-role-shell/dist/DAY-NIGHT-Driver-v1.0.0.apk | tee android-role-shell/driver-install.log
          grep -F "Success" android-role-shell/driver-install.log
          adb shell am start -W -n com.daynightae.driver/com.daynightae.shell.MainActivity | tee android-role-shell/driver-launch.log
          grep -F "Status: ok" android-role-shell/driver-launch.log
          adb shell dumpsys package com.daynightae.driver | grep -F "versionName=1.0.0" | tee -a android-role-shell/driver-launch.log
          sleep 5
          adb shell pidof com.daynightae.driver | tee -a android-role-shell/driver-launch.log
          test -s android-role-shell/driver-launch.log
          adb shell am force-stop com.daynightae.driver

          adb install -r android-role-shell/dist/DAY-NIGHT-Merchant-v1.0.0.apk | tee android-role-shell/merchant-install.log
          grep -F "Success" android-role-shell/merchant-install.log
          adb shell am start -W -n com.daynightae.merchant/com.daynightae.shell.MainActivity | tee android-role-shell/merchant-launch.log
          grep -F "Status: ok" android-role-shell/merchant-launch.log
          adb shell dumpsys package com.daynightae.merchant | grep -F "versionName=1.0.0" | tee -a android-role-shell/merchant-launch.log
          sleep 5
          adb shell pidof com.daynightae.merchant | tee -a android-role-shell/merchant-launch.log
          test -s android-role-shell/merchant-launch.log
          adb shell am force-stop com.daynightae.merchant

      - name: Stop Android emulator
        if: always()
        shell: bash
        run: |
          adb emu kill || true
          if [ -f android-role-shell/emulator/emulator.pid ]; then
            kill "$(cat android-role-shell/emulator/emulator.pid)" 2>/dev/null || true
          fi

      - name: Upload DAY NIGHT Driver builds
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Driver-v1.0.0
          path: |
            android-role-shell/dist/DAY-NIGHT-Driver-v1.0.0.apk
            android-role-shell/dist/DAY-NIGHT-Driver-v1.0.0.aab
            android-role-shell/dist/DAY-NIGHT-Driver-v1.0.0.sha256
            android-role-shell/dist/driver-badging.txt
            android-role-shell/driver-install.log
            android-role-shell/driver-launch.log
          if-no-files-found: error
          retention-days: 30

      - name: Upload DAY NIGHT Merchant builds
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Merchant-v1.0.0
          path: |
            android-role-shell/dist/DAY-NIGHT-Merchant-v1.0.0.apk
            android-role-shell/dist/DAY-NIGHT-Merchant-v1.0.0.aab
            android-role-shell/dist/DAY-NIGHT-Merchant-v1.0.0.sha256
            android-role-shell/dist/merchant-badging.txt
            android-role-shell/merchant-install.log
            android-role-shell/merchant-launch.log
          if-no-files-found: error
          retention-days: 30

      - name: Upload Android diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAY-NIGHT-Android-Diagnostics
          path: |
            android-role-shell/*-build.log
            android-role-shell/*-install.log
            android-role-shell/*-launch.log
            android-role-shell/emulator/
            android-role-shell/app/build/reports/
          if-no-files-found: warn
          retention-days: 14
