name: Merchant typecheck fix

on:
  push:
    branches:
      - merchant-figma-business-center-redesign
    paths:
      - .github/workflows/merchant-typecheck-fix.yml

permissions:
  contents: write

jobs:
  apply-typecheck-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: merchant-figma-business-center-redesign
          fetch-depth: 0
      - name: Correct collected amount type guard
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("artifacts/day-night-delivery/src/components/merchant/MerchantPortal.tsx")
          source = path.read_text(encoding="utf-8")
          old = 'if (explicitAmount !== null && explicitAmount !== undefined && explicitAmount !== "") return explicitAmount;'
          new = 'if (explicitAmount !== null && explicitAmount !== undefined) return explicitAmount;'
          if old not in source:
              raise SystemExit("Expected collected amount type guard not found")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit correction
        shell: bash
        run: |
          git config user.name "DAY NIGHT Automation"
          git config user.email "actions@users.noreply.github.com"
          git add artifacts/day-night-delivery/src/components/merchant/MerchantPortal.tsx
          git commit -m "Fix merchant collected amount type guard"
          git push origin HEAD:merchant-figma-business-center-redesign
