name: Merchant login dashboard theme

on:
  push:
    branches:
      - merchant-login-dashboard-theme
    paths:
      - .github/workflows/merchant-login-dashboard-theme.yml

permissions:
  contents: write

jobs:
  apply-theme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: merchant-login-dashboard-theme
          fetch-depth: 0

      - name: Integrate isolated merchant portal and login theme
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          merchant = Path('artifacts/day-night-delivery/src/components/merchant/MerchantPortal.tsx')
          source = merchant.read_text(encoding='utf-8')
          old_import = 'import "../../styles/dn-merchant-figma.css";'
          new_import = 'import "../../styles/dn-merchant-figma.css";\nimport "../../styles/dn-merchant-login-dashboard.css";'
          if 'dn-merchant-login-dashboard.css' not in source:
              if old_import not in source:
                  raise SystemExit('Merchant style import anchor not found')
              source = source.replace(old_import, new_import, 1)
          merchant.write_text(source, encoding='utf-8')

          app = Path('artifacts/day-night-delivery/src/App.tsx')
          source = app.read_text(encoding='utf-8')
          merchant_route = '''
  if (location.pathname === "/merchant") {
    return (
      <Suspense fallback={<div className="min-h-screen bg-[#f4f6fb]" />}>
        <DNRouteErrorBoundary resetKey={location.pathname}>
          <Routes>
            <Route path="/merchant" element={<MerchantPortal />} />
          </Routes>
        </DNRouteErrorBoundary>
      </Suspense>
    );
  }
'''
          auth_block = '''  if (location.pathname === "/auth") {
    return (
      <Suspense fallback={<div className="min-h-screen bg-[#071A33]" />}>
        <Routes>
          <Route path="/auth" element={<Auth onAuthSuccess={() => navigate("/admin")} />} />
        </Routes>
      </Suspense>
    );
  }
'''
          if 'if (location.pathname === "/merchant")' not in source:
              if auth_block not in source:
                  raise SystemExit('App auth route anchor not found')
              source = source.replace(auth_block, auth_block + merchant_route, 1)

          old_skip = '(window.location.pathname === "/auth" || new URLSearchParams(window.location.search).has("nosplash"));'
          new_skip = '(window.location.pathname === "/auth" || window.location.pathname === "/merchant" || new URLSearchParams(window.location.search).has("nosplash"));'
          if old_skip in source:
              source = source.replace(old_skip, new_skip, 1)
          elif new_skip not in source:
              raise SystemExit('Splash skip anchor not found')
          app.write_text(source, encoding='utf-8')
          PY

      - name: Commit integration
        shell: bash
        run: |
          git config user.name "DAY NIGHT Automation"
          git config user.email "actions@users.noreply.github.com"
          git add artifacts/day-night-delivery/src/components/merchant/MerchantPortal.tsx artifacts/day-night-delivery/src/App.tsx
          git commit -m "Redesign merchant sign-in to match dashboard theme"
          git push origin HEAD:merchant-login-dashboard-theme
