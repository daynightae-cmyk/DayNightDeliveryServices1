name: Merchant Integration Loader

on:
  push:
    branches:
      - merchant-portal-final-integration
    paths:
      - .merchant-payload/READY

permissions:
  contents: write

concurrency:
  group: merchant-integration-loader
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: merchant-portal-final-integration
          fetch-depth: 0
          persist-credentials: true

      - name: Decode and verify payload
        shell: bash
        run: |
          set -euo pipefail
          test -f .merchant-payload/READY
          cat .merchant-payload/part-* | base64 --decode > /tmp/merchant-integration-payload.tar.gz
          echo "464597328b49371cdfde001cfa3f60a73918546819e6c7a480d78bcb0a6c08e7  /tmp/merchant-integration-payload.tar.gz" | sha256sum -c -
          tar -tzf /tmp/merchant-integration-payload.tar.gz >/tmp/merchant-payload-files.txt
          grep -q '^artifacts/day-night-delivery/src/components/merchant/MerchantPortalCommandCenter.tsx$' /tmp/merchant-payload-files.txt
          grep -q '^supabase/migrations/20260721123000_merchant_business_center_runtime.sql$' /tmp/merchant-payload-files.txt

      - name: Apply integration files
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/merchant-integration-payload.tar.gz -C .
          rm -rf .merchant-payload
          rm -f .merchant-integration-branch
          node artifacts/day-night-delivery/scripts/merchant-final-closure-gate.mjs

      - name: Commit integrated Merchant Portal
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DAY NIGHT Integration Bot"
          git config user.email "admin@daynightae.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No integration changes to commit."
            exit 0
          fi
          git commit -m "feat(merchant): complete production merchant command center"
          git push origin HEAD:merchant-portal-final-integration
