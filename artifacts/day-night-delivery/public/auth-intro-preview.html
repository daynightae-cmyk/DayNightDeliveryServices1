<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DAY NIGHT Admin Intro Preview</title>
  <style>
    html,body{margin:0;min-height:100%;overflow:hidden;background:#03152f;color:#fff;font-family:Arial,Tahoma,sans-serif}
    .screen{position:fixed;inset:0;background:radial-gradient(circle at 70% 40%,rgba(0,121,255,.34),transparent 32rem),linear-gradient(135deg,#03152f,#062758,#020914)}
    .lang{position:absolute;top:28px;left:30px;z-index:5;min-width:92px;height:44px;border:1px solid #d4af37;border-radius:999px;color:#ffe49b;background:#031b3e;font-weight:900}
    .layout{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:64px;width:min(1440px,calc(100vw - 64px));margin:auto}
    .visual{position:relative;min-height:680px}.logo{position:absolute;left:2%;top:20%;width:min(40vw,470px);filter:drop-shadow(0 0 24px #167eff)}.khalifa{position:absolute;right:-4%;bottom:2%;width:min(32vw,390px)}
    .copy{text-align:right;max-width:590px}.pill{display:inline-flex;padding:9px 24px;margin-bottom:24px;border:1px solid #4da0ff;border-radius:999px;background:rgba(12,45,92,.42);font-size:24px;font-weight:900}.title{margin:0;font-size:clamp(66px,7vw,116px);line-height:.9;font-weight:1000}.subtitle{margin:18px 0 0;font-size:clamp(23px,2.35vw,38px);font-weight:900;color:#f2be36}.desc{margin:26px 0 0;color:#dfeeff;font-size:24px;line-height:1.72;font-weight:700}.features{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:38px}.feature{min-height:116px;display:flex;align-items:center;justify-content:center;border:1px solid #3d8be0;border-radius:21px;background:rgba(5,25,61,.64);font-weight:900}.cta{margin-top:34px;width:min(100%,572px);min-height:76px;border:1px solid #ffe597;border-radius:18px;color:#061224;background:linear-gradient(180deg,#ffe58e,#f4c24f 48%,#d99a25);font-size:25px;font-weight:1000;cursor:pointer}
  </style>
</head>
<body>
  <section class="screen">
    <button class="lang">English</button>
    <div class="layout">
      <div class="visual">
        <img class="logo" src="/assets/daynight/admin-auth-v3/logo-glass.png" alt="DAY NIGHT" />
        <img class="khalifa" src="/assets/daynight/admin-auth-v3/khalifa-card-reference.png" alt="Khalifa" />
      </div>
      <div class="copy">
        <div class="pill">مرحباً بك في</div>
        <h1 class="title">بوابة<br/>الإدارة</h1>
        <div class="subtitle">لخدمات توصيل موثوقة وسريعة</div>
        <p class="desc">نمنحك تجربة إدارة متكاملة للتحكم أكثر سهولة<br/>وأداء أفضل لخدماتك</p>
        <div class="features"><div class="feature">دعم على مدار الساعة</div><div class="feature">تتبع لحظي</div><div class="feature">سريع وفعال</div><div class="feature">آمن وموثوق</div></div>
        <button class="cta" onclick="location.href='/auth'">تسجيل الدخول إلى البوابة</button>
      </div>
    </div>
  </section>
</body>
</html>
